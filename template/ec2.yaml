  MyEc2Github:
    Type: AWS::EC2::Instance
    Properties:
      AvailabilityZone: us-east-1a
      ImageId: ami-0440d3b780d96b29d
      InstanceType: t2.micro
      SecurityGroupIds:
        - !GetAtt ServerSecurityGroupClase.GroupId
      Tags:
        - Key: Name
          Value: EC2-Sdan1-CF
        - Key: Proyecto
          Value: Class-CloudFormation
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<html><body>
          <h1>${InstanceDescription} 👏</h1>
          <h2>Hola desde CloudFormation con GitHub 🚀</h2>
          </body></html>" > /var/www/html/index.html
